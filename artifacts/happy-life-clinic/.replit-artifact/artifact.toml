kind = "web"
previewPath = "/"
title = "Happy Life Dermatologists"
version = "1.0.0"
id = "artifacts/happy-life-clinic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23133

[services.development]
run = "pnpm --filter @workspace/happy-life-clinic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/happy-life-clinic", "run", "build" ]
publicDir = "artifacts/happy-life-clinic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23133"
BASE_PATH = "/"
